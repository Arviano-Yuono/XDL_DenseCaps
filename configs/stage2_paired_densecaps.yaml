data:
  root_dir: data/kvasir-v2
  pair_metadata_path: artifacts/kvasir_v2_densenet121_capsnet/filtered_lesion_regions/metadata.json
  label_from_parent_dir: true
  class_names:
    - normal-cecum
    - normal-pylorus
    - normal-z-line
    - esophagitis
    - polyps
    - uc
  split_dir: data/splits/stage2_paired_densecaps
  image_size: 128
  batch_size: 4
  num_workers: 0
  val_ratio: 0.2
  test_ratio: 0.1
  seed: 42
  augment: true
  pin_memory: true

model:
  name: paired_densenet121_capsnet
  pretrained: false
  backbone_checkpoint_path: artifacts/kvasir_v2_densenet121_capsnet/best.pt
  freeze_backbone: false
  feature_h: 4
  feature_w: 4
  primary_caps_dim: 8
  capsule_dim: 8
  digit_caps_dim: 16
  num_capsules: 256
  capsule_routing_iters: 2
  digit_routing_iters: 3
  margin_m_plus: 0.9
  margin_m_minus: 0.1
  margin_lambda: 0.5

training:
  epochs: 100
  learning_rate: 0.00005
  weight_decay: 0.0001
  early_stopping_patience: 30

runtime:
  output_dir: artifacts/stage2_paired_densecaps
  device: cuda
  checkpoint_name: best.pt
  log_level: INFO
  train_log_file: train.log
  val_log_file: val.log
  test_log_file: test.log
